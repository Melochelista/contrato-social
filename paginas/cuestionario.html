<html>

<head>
    <title> Cuestionario - Contrato social </title>
</head>

<body bgcolor="#d6d7c6" text="000000">

    <img src="../img/logo.png">
    <a href="../index.html">
        <img src="../img/inicio.png" alt="boton de inicio"></a>
    <p>
    <h1 style="font-family: 'Times New Roman', Times, serif; color: #000000; letter-spacing: 1px;">
        <hr style="border: 1px solid black;">
        FORMATO DE REGISTRO E INFORMACIÓN
        <hr style="border: 1px solid black;">
    </h1>

    <div
        style="font-family: 'Arial', sans-serif; color: #000000; background-color: #ffffff; padding: 30px; border: 2px solid #000000; width: 75%; box-shadow: 5px 5px 15px rgba(0,0,0,0.3);">
        <p style="font-family: 'Times New Roman', Times, serif; font-size: 18px;"><i>Instrucciones: Llene cuidadosamente
                cada uno de los campos solicitados con la información correspondiente.</i></p>
        <hr>

        <form action="#" method="get" style="font-size: 15px; line-height: 1.8;">
            <p><b>NOMBRE COMPLETO:</b><br>
                <input type="text" name="nombre" size="50" placeholder="Apellido Paterno / Apellido Materno / Nombre(s)"
                    required style="border: 1px solid #000; padding: 5px; font-family: 'Arial';">
            </p>

            <p><b>CORREO ELECTRÓNICO:</b><br>
                <input type="email" name="correo" size="50" placeholder="usuario@correo.com" required
                    style="border: 1px solid #000; padding: 5px; font-family: 'Arial';">
            </p>

            <p><b>NÚMERO DE TELÉFONO:</b><br>
                <input type="tel" name="telefono" size="25" placeholder="Ej. 5512345678"
                    style="border: 1px solid #000; padding: 5px; font-family: 'Arial';">
            </p>

            <p><b>EDAD:</b><br>
                <input type="number" name="edad" min="1" max="100"
                    style="width: 80px; border: 1px solid #000; padding: 5px; font-family: 'Arial';"> años
            </p>

            <p><b>FECHA DE NACIMIENTO:</b><br>
                <input type="date" name="fecha_nacimiento"
                    style="border: 1px solid #000; padding: 5px; font-family: 'Arial';">
            </p>

            <p><b>COMENTARIOS Y OPINIONES:</b><br>
                <textarea name="opinion" rows="6" cols="70" placeholder="Escriba aquí..."
                    style="border: 1px solid #000; padding: 5px; font-family: 'Arial';"></textarea>
            </p>

            <br>
            <p style="text-align: center;">

                <input type="reset" value="LIMPIAR FORMATO"
                    style="background-color: #dddddd; color: #000000; font-weight: bold; padding: 10px 20px; border: 1px solid #000; cursor: pointer;">
                &nbsp;
            </p>
        </form>
    </div>

</body>

</html>
